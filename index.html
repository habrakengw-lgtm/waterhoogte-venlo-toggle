<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2a2d2f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Venlo H" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Waterhoogte Venlo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap');
    :root {
      --green:        #43B02A;
      --green-light:  #5fd943;
      --green-dim:    rgba(67,176,42,0.15);
      --green-border: rgba(67,176,42,0.30);
      --blue:         #7eb8f7;
      --blue-dim:     rgba(126,184,247,0.15);
      --blue-border:  rgba(126,184,247,0.30);
      --blue-meas:    #4a9ede;
      --orange:       #f0a500;
      --charcoal:     #53565A;
      --bg:           #1e2022;
      --bg2:          #26292b;
      --bg3:          #2e3133;
      --surface:      rgba(255,255,255,0.04);
      --border:       rgba(255,255,255,0.08);
      --border-strong:rgba(255,255,255,0.14);
      --text:         #e8e9ea;
      --text-dim:     #9a9d9f;
      --text-muted:   #66696c;
      --low:          #43B02A;
      --mid:          #f0a500;
      --high:         #e8622a;
      --extreme:      #d93025;
      --safe-top:     env(safe-area-inset-top,0px);
      --safe-bot:     env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Maven Pro',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100dvh}

    /* ── Header ── */
    .header{background:var(--bg2);border-bottom:1px solid var(--border-strong);padding:calc(14px + var(--safe-top)) 20px 16px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .lbl{font-family:'Maven Pro',sans-serif;font-size:9px;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:5px}
    .title{font-family:'Maven Pro',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px;line-height:1}
    .sub{font-size:10px;color:var(--text-muted);margin-top:4px}
    .title-block{border-left:3px solid var(--green);padding-left:10px}

    .cur{text-align:right;flex-shrink:0}
    .cur-lbl{font-family:'Maven Pro',sans-serif;font-size:8px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:2px}
    .cur-val{font-family:'Maven Pro',sans-serif;font-size:28px;font-weight:600;color:var(--green-light);line-height:1}
    .cur-unit{font-size:11px;color:var(--green);font-weight:500}

    /* ── Refresh row ── */
    .refresh-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
    .btn{display:flex;align-items:center;gap:7px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:6px;color:var(--green-light);font-family:'Maven Pro',sans-serif;font-size:11px;font-weight:600;padding:9px 16px;cursor:pointer;letter-spacing:.5px;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent;user-select:none}
    .btn:active{transform:scale(.97);background:rgba(67,176,42,.25)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .btn-toggle{display:flex;align-items:center;gap:7px;background:rgba(126,184,247,0.1);border:1px solid rgba(126,184,247,0.25);border-radius:6px;color:#7eb8f7;font-family:'Maven Pro',sans-serif;font-size:11px;font-weight:600;padding:9px 16px;cursor:pointer;letter-spacing:.5px;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent;user-select:none}
    .btn-toggle:active{transform:scale(.97)}
    .btn-toggle.active{background:rgba(126,184,247,0.22);border-color:rgba(126,184,247,0.5);color:#b8d8fb}
    .spinning{animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .rtime{font-family:'Maven Pro',sans-serif;font-size:9px;color:var(--text-muted)}

    /* ── Status bar ── */
    .sbar{margin:10px 20px 0;padding:9px 14px;border-radius:6px;font-size:11px;line-height:1.5;display:none}
    .sbar.err {background:rgba(217,48,37,.1);border:1px solid rgba(217,48,37,.3);color:#f28b82}
    .sbar.warn{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);color:#fdd663}
    .sbar.info{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green-light)}

    /* ── Content ── */
    .content{flex:1;padding:20px 16px calc(20px + var(--safe-bot));display:flex;flex-direction:column;gap:18px}
    .empty{text-align:center;padding:80px 20px;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:16px}
    .empty-icon{opacity:.35;width:66px;height:44px}
    .empty-txt{font-size:13px;line-height:1.6;max-width:260px}

    /* ── Section labels ── */
    .slbl{font-family:'Maven Pro',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px}

    /* ── Legend ── */
    .legend{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:10px}
    .legend-item{display:flex;align-items:center;gap:5px;color:var(--text-muted)}
    .ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .lline{width:16px;height:3px;flex-shrink:0;border-radius:2px}
    .ldash{width:16px;border-top:2px dashed rgba(126,184,247,0.7);flex-shrink:0}
    .ldash-orange{width:16px;border-top:2px dashed rgba(240,165,0,0.8);flex-shrink:0}

    /* ── Chart card ── */
    .ccard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 8px 10px}
    .cwrap{position:relative;height:300px}

    /* ── Accuracy pill ── */
    .acc-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .apill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;flex:1;min-width:120px}
    .apill-lbl{font-size:9px;letter-spacing:.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;font-family:'Maven Pro',sans-serif}
    .apill-val{font-size:16px;font-weight:600;font-family:'Maven Pro',sans-serif;color:var(--green-light)}

    /* ── Stats strip ── */
    .sstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 10px;text-align:center}
    .sc-lbl{font-family:'Maven Pro',sans-serif;font-size:11px;font-weight:500;letter-spacing:.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
    .sc-val{font-family:'Maven Pro',sans-serif;font-size:18px;font-weight:600;color:var(--green-light)}
    .sc-u{font-size:9px;color:var(--green)}

    /* ── Table ── */
    .tcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .tscroll{overflow-x:auto;max-height:320px;overflow-y:auto}
    table{width:100%;border-collapse:collapse;font-size:11px;min-width:500px}
    thead th{position:sticky;top:0;background:var(--bg2);padding:9px 12px;text-align:left;color:var(--text-muted);font-weight:600;letter-spacing:.5px;font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border-strong);white-space:nowrap;font-family:'Maven Pro',sans-serif}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
    tbody tr.fr{border-left:2px solid rgba(126,184,247,.35)}
    tbody tr:active{background:rgba(67,176,42,.06)}
    tbody td{padding:8px 12px;white-space:nowrap;color:var(--text-dim)}
    td.tdh{color:var(--green-light);font-weight:600;font-size:12px;font-family:'Maven Pro',sans-serif}
    td.tdb{color:var(--blue);font-weight:600;font-size:12px;font-family:'Maven Pro',sans-serif}
    td.tdd{color:var(--text-muted);font-size:10px;font-family:'Maven Pro',sans-serif}
    td.tddiff{font-size:11px;font-family:'Maven Pro',sans-serif;font-weight:600}
    .rbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;font-family:'Maven Pro',sans-serif}
    .tf{font-size:9px;color:var(--blue);font-family:'Maven Pro',sans-serif}
    .tm{font-size:9px;color:var(--text-muted);font-family:'Maven Pro',sans-serif}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(67,176,42,.3);border-radius:2px}

    /* ── Animation ── */
    .fade-in{animation:fi .35s ease both}
    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* ── Install banner ── */
    .ibanner{position:fixed;bottom:calc(16px + var(--safe-bot));left:16px;right:16px;background:var(--bg2);border:1px solid var(--green-border);border-radius:10px;padding:14px 16px;display:none;align-items:center;gap:12px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .itxt{flex:1;font-size:11px;color:var(--text-dim);line-height:1.4}
    .itxt strong{color:var(--text)}
    .ibtn{background:var(--green-dim);border:1px solid var(--green-border);border-radius:6px;color:var(--green-light);font-family:'Maven Pro',sans-serif;font-size:11px;font-weight:600;padding:8px 14px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .idism{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="title-block">
      <div class="lbl">RWS · Sint Pieter → Venlo</div>
      <div class="title">Verwachte<br>waterhoogte Venlo</div>
      <div class="sub">Berekende waterhoogte Venlo op basis van waterafvoer bij Sint Pieter</div>
    </div>
    <div class="cur" id="curBlock" style="display:none">
      <div class="cur-lbl">Huidig gemeten</div>
      <div class="cur-val" id="curVal">—</div>
      <div class="cur-unit">cm NAP</div>
      <div id="curDatetime" style="font-size:9px;color:var(--text-muted);margin-top:3px"></div>
    </div>
  </div>
  <div class="refresh-row">
    <button class="btn" id="btnRefresh" onclick="refreshData()">
      <span class="spin" id="spinIcon">⟳</span>
      <span id="btnLbl">Ververs data (RWS)</span>
    </button>
    <button class="btn-toggle" id="btnToggle" onclick="toggleMode()">
      <span id="toggleIcon">⇄</span>
      <span id="toggleLbl">Toon vergelijking</span>
    </button>
    <span class="rtime" id="rtime"></span>
  </div>
</div>

<div class="sbar" id="sbar"></div>

<div class="content">
  <div class="empty" id="emptyState">
    <img class="empty-icon" src="https://i.ibb.co/TxTq52HK/Beeldmerk-GWL-HEX.png" alt="Logo" />
    <div class="empty-txt">Klik op <strong style="color:var(--green)">"Ververs data"</strong> om de meest recente data op te halen.</div>
  </div>
  <div id="main" style="display:none;flex-direction:column;gap:20px;"></div>
</div>

<div class="ibanner" id="ibanner">
  <div class="itxt"><strong>Installeer als app</strong><br>Voeg toe aan beginscherm voor snelle toegang.</div>
  <button class="ibtn" onclick="installPWA()">Installeer</button>
  <button class="idism" onclick="dismissInstall()">✕</button>
</div>

<script>
// ═══════════════════════════════════════
// MODEL PARAMETERS  (Excel "Parameters")
// ═══════════════════════════════════════
const P = {
  Q_P70:335.652, Q_P90:661.022, Q_EXT:1350, s_EXT:0.365329, H_at_QEXT:1468.871528,
  LOW: {a0:1124.125163, a1:10.166296,  a2: 2.526432,  q_mean:129.850031, q_std: 85.739993},
  MID: {a0:1210.118821, a1:30.70892,   a2: 2.240687,  q_mean:473.631258, q_std: 88.385528},
  HIGH:{a0:1391.697171, a1:91.653817,  a2:-26.999303, q_mean:952.246329, q_std:257.094962},
};
const RC = {LOW:'#43B02A', MID:'#f0a500', HIGH:'#e8622a', EXTREME:'#d93025'};

function regime(Q){return Q<P.Q_P70?'LOW':Q<P.Q_P90?'MID':Q<P.Q_EXT?'HIGH':'EXTREME'}
function calcH(Q){
  const r=regime(Q);
  if(r==='EXTREME') return P.H_at_QEXT+P.s_EXT*(Q-P.Q_EXT);
  const p=P[r], z=(Q-p.q_mean)/p.q_std;
  return p.a0+p.a1*z+p.a2*z*z;
}

// ═══════════════════════════════════════
// DATA FETCH
// ═══════════════════════════════════════
async function fetchCalculated(){
  const res  = await fetch('https://rws-data.habraken-gw.workers.dev');
  const body = await res.json().catch(()=>{throw new Error('Onleesbare response (calculated)')});
  if(!res.ok) throw new Error(`Fout berekende data (HTTP ${res.status}${body?.error?' — '+body.error:''})`);
  if(!Array.isArray(body)||!body.length) throw new Error('Lege dataset (calculated)');
  return body.map(r=>({
    datetime:   new Date(r.datetime),
    Q:          r.Q,
    H_cmNAP:    r.H_cmNAP,
    regime:     r.regime,
    isForecast: new Date(r.datetime).getTime() > Date.now(),
  }));
}

async function fetchMeasured(){
  const res  = await fetch('https://rws-current-test.habraken-gw.workers.dev?t='+Date.now());
  if(!res.ok) return [];
  const body = await res.json().catch(()=>[]);
  if(body.error||!Array.isArray(body)) return [];
  return body.map(r=>({
    datetime:   new Date(r.datetime),
    H_cmNAP:    r.H_cmNAP,
    type:       r.type,   // "measured" | "forecast"
  }));
}

async function fetchHistorical(){
  const res  = await fetch('https://rws-sintpieter.habraken-gw.workers.dev?t='+Date.now());
  if(!res.ok) return [];
  const body = await res.json().catch(()=>[]);
  if(body.error||!Array.isArray(body)) return [];
  const now = Date.now();
  return body
    .map(r=>({
      datetime: new Date(r.datetime),
      Q:        r.Q,
      H_cmNAP:  r.H_cmNAP,
      regime:   r.regime,
    }))
    .filter(r => r.datetime.getTime() <= now);
}

let chart=null, calcRows=[], measRows=[], retroRows=[];
let compareMode = false;
const fmt = d => d.toLocaleString('nl-NL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

function toggleMode(){
  compareMode = !compareMode;
  const btn = document.getElementById('btnToggle');
  const lbl = document.getElementById('toggleLbl');
  if(compareMode){
    btn.classList.add('active');
    lbl.textContent = 'Verberg vergelijking';
  } else {
    btn.classList.remove('active');
    lbl.textContent = 'Toon vergelijking';
  }
  if(calcRows.length) render();
}

function status(msg, type='err'){
  const el=document.getElementById('sbar');
  if(!msg){el.style.display='none';return;}
  el.textContent=msg; el.className='sbar '+type; el.style.display='block';
}

async function refreshData(){
  const btn=document.getElementById('btnRefresh');
  const ico=document.getElementById('spinIcon');
  const lbl=document.getElementById('btnLbl');
  btn.disabled=true; ico.classList.add('spinning'); lbl.textContent='Laden…'; status(null);
  try{
    const [calc, meas, retro] = await Promise.all([fetchCalculated(), fetchMeasured(), fetchHistorical()]);
    calcRows  = calc;
    measRows  = meas;
    retroRows = retro;

    // Update current measured level in header
    const latestMeas = meas.filter(r=>r.type==='measured').slice(-1)[0];
    if(latestMeas){
      document.getElementById('curVal').textContent     = latestMeas.H_cmNAP.toFixed(1);
      document.getElementById('curDatetime').textContent = fmt(latestMeas.datetime);
      document.getElementById('curBlock').style.display  = 'block';
    }

    status(`✓ ${calcRows.length} voorspelling · ${measRows.filter(r=>r.type==='measured').length} gemeten · ${retroRows.length} retroactief berekend`,'info');
    render();
    document.getElementById('rtime').textContent = 'Bijgewerkt: '+fmt(new Date());
  }catch(e){
    status('⚠ '+e.message,'err');
  }finally{
    btn.disabled=false; ico.classList.remove('spinning'); lbl.textContent='Ververs data (RWS)';
  }
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  if(!calcRows.length) return;
  document.getElementById('emptyState').style.display='none';
  const main=document.getElementById('main');
  main.style.display='flex'; main.innerHTML='';
  const now=Date.now();

  // ── Stats strip (always shown) ──
  const hs  = calcRows.map(r=>r.H_cmNAP);
  const mn  = Math.min(...hs), mx=Math.max(...hs);
  const peak= calcRows.find(r=>r.H_cmNAP===mx);

  const se=document.createElement('div'); se.className='fade-in';
  se.innerHTML=`<div class="slbl">Statistieken · ${calcRows.length} berekende punten</div>
  <div class="sstrip">
    <div class="sc"><div class="sc-lbl">Min berekend</div><div class="sc-val">${mn.toFixed(0)}<span class="sc-u"> cm</span></div></div>
    <div class="sc"><div class="sc-lbl">Max berekend</div><div class="sc-val">${mx.toFixed(0)}<span class="sc-u"> cm</span></div></div>
    <div class="sc"><div class="sc-lbl">Piek op</div><div class="sc-val" style="font-size:11px;color:var(--green-light)">${peak?fmt(peak.datetime):'—'}</div></div>
  </div>`;
  main.appendChild(se);

  if(chart){chart.destroy();chart=null;}

  if(compareMode){
    renderComparison(main, now);
  } else {
    renderModelOnly(main, now);
  }

  // ── Forecast table (always shown) ──
  const fe=document.createElement('div'); fe.className='fade-in'; fe.style.animationDelay='.15s';
  fe.innerHTML=`<div class="slbl">Alle berekende punten (model)</div>
  <div class="tcard"><div class="tscroll"><table>
    <thead><tr><th>Datum &amp; Tijd</th><th>Q Sint Pieter (m³/s)</th><th>H Venlo (cm NAP)</th><th>Regime</th><th>Type</th></tr></thead>
    <tbody id="tb"></tbody>
  </table></div></div>`;
  main.appendChild(fe);
  const tb=fe.querySelector('#tb');
  calcRows.forEach(r=>{
    const c=RC[r.regime], tr=document.createElement('tr');
    if(r.isForecast) tr.className='fr';
    tr.innerHTML=`<td class="tdd">${fmt(r.datetime)}</td><td>${r.Q.toFixed(1)}</td><td class="tdh">${r.H_cmNAP.toFixed(1)}</td>
    <td><span class="rbadge" style="background:${c}22;color:${c};border:1px solid ${c}44">${r.regime}</span></td>
    <td>${r.isForecast?'<span class="tf">▸ voorspelling</span>':'<span class="tm">gemeten</span>'}</td>`;
    tb.appendChild(tr);
  });
}

// ── Model-only chart (forecast only, tight time axis) ──
function renderModelOnly(main, now){
  const ce=document.createElement('div'); ce.className='fade-in'; ce.style.animationDelay='.05s';
  ce.innerHTML=`<div class="slbl">Verwachte waterhoogte Venlo (model)</div>
  <div class="legend">
    <div class="legend-item"><span class="lline" style="background:#43B02A"></span>Berekend (model)</div>
    <div class="legend-item"><span class="ldash" style="border-top-color:#43B02A"></span>Voorspelling model</div>
    ${Object.entries(RC).map(([r,c])=>`<div class="legend-item"><span class="ldot" style="background:${c}"></span>${r}</div>`).join('')}
  </div>
  <div class="ccard" style="margin-top:10px"><div class="cwrap"><canvas id="wc"></canvas></div></div>`;
  main.appendChild(ce);

  const step = Math.max(1,Math.floor(calcRows.length/300));
  const samp = calcRows.filter((_,i)=>i%step===0);
  const times = samp.map(r=>r.datetime.getTime());

  const ctx=document.getElementById('wc').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,220);
  g.addColorStop(0,'rgba(67,176,42,0.18)'); g.addColorStop(1,'rgba(67,176,42,0)');

  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels: samp.map(r=>fmt(r.datetime)),
      datasets:[{
        label:'Berekend (model)',
        data: samp.map(r=>r.H_cmNAP),
        borderColor: samp.map(r=>RC[r.regime]),
        borderWidth: 1.8,
        pointBackgroundColor: samp.map(r=>RC[r.regime]),
        pointRadius: samp.length>120?0:3,
        pointHoverRadius: 4,
        tension: 0.3,
        fill: true,
        backgroundColor: g,
        spanGaps: true,
        segment:{borderDash:ctx=>samp[ctx.p1DataIndex]?.isForecast?[5,3]:[]},
      }],
    },
    options:{
      animation:{duration:400}, responsive:true, maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(38,41,43,0.97)',
          borderColor:'rgba(67,176,42,0.35)',borderWidth:1,
          titleColor:'#66696c',bodyColor:'#5fd943',
          titleFont:{family:'Maven Pro',size:11},
          bodyFont:{family:'Maven Pro',size:15,weight:'600'},
          padding:10,
          callbacks:{label:ctx=>{const r=samp[ctx.dataIndex];return `${ctx.parsed.y.toFixed(1)} cm NAP  |  Q: ${r.Q.toFixed(1)} m³/s  [${r.regime}]`;}},
        },
      },
      scales:{
        x:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{color:'#66696c',font:{family:'Maven Pro',size:11},maxTicksLimit:6,maxRotation:30},
          border:{color:'rgba(255,255,255,0.08)'},
          title:{display:true,text:'Datum/tijd (Venlo, incl. vertraging t.o.v. Sint Pieter)',color:'#66696c',font:{family:'Maven Pro',size:11},padding:{top:6}},
        },
        y:{
          grid:{color:'rgba(255,255,255,0.05)'},
          ticks:{color:'#66696c',font:{family:'Maven Pro',size:11},callback:v=>v.toFixed(0)},
          border:{display:false},
          title:{display:true,text:'Verwachte waterhoogte Venlo (cm t.o.v. NAP)',color:'#66696c',font:{family:'Maven Pro',size:11},padding:{bottom:6}},
        },
      },
    },
  });
}

// ── Comparison chart (all three lines, full time axis) ──
function renderComparison(main, now){
  const ce=document.createElement('div'); ce.className='fade-in'; ce.style.animationDelay='.05s';
  ce.innerHTML=`<div class="slbl">Berekende vs. gemeten waterhoogte Venlo</div>
  <div class="legend">
    <div class="legend-item"><span class="lline" style="background:#43B02A"></span>Berekend voorspelling (model)</div>
    <div class="legend-item"><span class="ldash" style="border-top-color:#43B02A"></span>Voorspelling model</div>
    <div class="legend-item"><span class="lline" style="background:#f0a500"></span>Berekend terugkijkend (model)</div>
    <div class="legend-item"><span class="lline" style="background:var(--blue-meas)"></span>Gemeten (RWS)</div>
    <div class="legend-item"><span class="ldash"></span>Voorspelling RWS</div>
    ${Object.entries(RC).map(([r,c])=>`<div class="legend-item"><span class="ldot" style="background:${c}"></span>${r}</div>`).join('')}
  </div>
  <div class="ccard" style="margin-top:10px"><div class="cwrap"><canvas id="wc"></canvas></div></div>`;
  main.appendChild(ce);

  const BUCKET=10*60*1000;
  const bkt=t=>Math.round(t/BUCKET)*BUCKET;

  const stepCalc  = Math.max(1,Math.floor(calcRows.length/300));
  const stepMeas  = Math.max(1,Math.floor(measRows.length/300));
  const stepRetro = Math.max(1,Math.floor(retroRows.length/300));
  const sampCalc  = calcRows.filter((_,i)=>i%stepCalc===0);
  const sampMeas  = measRows.filter((_,i)=>i%stepMeas===0);
  const sampRetro = retroRows.filter((_,i)=>i%stepRetro===0);

  const allTimes=new Set();
  sampCalc.forEach(r=>allTimes.add(r.datetime.getTime()));
  sampMeas.forEach(r=>allTimes.add(r.datetime.getTime()));
  sampRetro.forEach(r=>allTimes.add(r.datetime.getTime()));
  const sortedTimes=[...allTimes].sort((a,b)=>a-b);

  const calcMap2  = new Map(sampCalc.map(r=>[r.datetime.getTime(),r]));
  const retroMap2 = new Map(sampRetro.map(r=>[r.datetime.getTime(),r]));
  const measMap2  = new Map(sampMeas.map(r=>[bkt(r.datetime.getTime()),r]));

  const labels      = sortedTimes.map(t=>fmt(new Date(t)));
  const calcData    = sortedTimes.map(t=>calcMap2.has(t)?calcMap2.get(t).H_cmNAP:null);
  const retroData   = sortedTimes.map(t=>retroMap2.has(t)?retroMap2.get(t).H_cmNAP:null);
  const measData    = sortedTimes.map(t=>measMap2.has(bkt(t))?measMap2.get(bkt(t)).H_cmNAP:null);
  const calcColors  = sortedTimes.map(t=>calcMap2.has(t)?RC[calcMap2.get(t).regime]:'#43B02A');
  const retroColors = sortedTimes.map(t=>retroMap2.has(t)?RC[retroMap2.get(t).regime]:'#f0a500');
  const calcIsFc    = sortedTimes.map(t=>calcMap2.has(t)?calcMap2.get(t).isForecast:false);

  const ctx=document.getElementById('wc').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:'Berekend voorspelling (model)',
          data: calcData,
          borderColor: calcColors,
          borderWidth: 1.8,
          pointBackgroundColor: calcColors,
          pointRadius: sampCalc.length>120?0:3,
          pointHoverRadius: 4,
          tension: 0.3, fill:false, spanGaps:true,
          segment:{borderDash:ctx=>calcIsFc[ctx.p1DataIndex]?[5,3]:[]},
        },
        {
          label:'Berekend terugkijkend (model)',
          data: retroData,
          borderColor: retroColors,
          borderWidth: 1.8,
          pointBackgroundColor: retroColors,
          pointRadius: sampRetro.length>120?0:3,
          pointHoverRadius: 4,
          tension: 0.3, fill:false, spanGaps:true,
        },
        {
          label:'Gemeten (RWS)',
          data: measData,
          borderColor: 'rgba(74,158,222,0.85)',
          borderWidth: 2,
          pointBackgroundColor: 'rgba(74,158,222,0.9)',
          pointRadius: sampMeas.length>120?0:3,
          pointHoverRadius: 4,
          tension: 0.3, fill:false, spanGaps:true,
          segment:{
            borderColor: ctx=>sortedTimes[ctx.p1DataIndex]>now?'rgba(126,184,247,0.6)':'rgba(74,158,222,0.85)',
            borderDash:  ctx=>sortedTimes[ctx.p1DataIndex]>now?[5,3]:[],
          },
        },
      ],
    },
    options:{
      animation:{duration:400}, responsive:true, maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(38,41,43,0.97)',
          borderColor:'rgba(67,176,42,0.35)',borderWidth:1,
          titleColor:'#66696c',
          titleFont:{family:'Maven Pro',size:11},
          bodyFont:{family:'Maven Pro',size:13,weight:'600'},
          padding:10,
          callbacks:{
            label:ctx=>{
              const t=sortedTimes[ctx.dataIndex];
              if(ctx.datasetIndex===0){
                const cr=calcMap2.get(t);
                if(!cr||ctx.parsed.y===null) return null;
                return `Voorspelling model: ${ctx.parsed.y.toFixed(1)} cm  |  Q: ${cr.Q.toFixed(1)} m³/s  [${cr.regime}]`;
              } else if(ctx.datasetIndex===1){
                const rr=retroMap2.get(t);
                if(!rr||ctx.parsed.y===null) return null;
                return `Terugkijkend model: ${ctx.parsed.y.toFixed(1)} cm  |  Q: ${rr.Q.toFixed(1)} m³/s  [${rr.regime}]`;
              } else {
                const mr=measMap2.get(bkt(t));
                if(!mr||ctx.parsed.y===null) return null;
                return `${mr.type==='forecast'?'RWS voorspelling':'Gemeten'}: ${ctx.parsed.y.toFixed(1)} cm`;
              }
            },
            afterBody:items=>{
              const ri=items.find(i=>i.datasetIndex===1);
              const mi=items.find(i=>i.datasetIndex===2);
              if(ri&&mi&&ri.parsed.y!==null&&mi.parsed.y!==null){
                const diff=(ri.parsed.y-mi.parsed.y).toFixed(1);
                return [`Δ model−gemeten: ${+diff>0?'+':''}${diff} cm`];
              }
              return [];
            },
          },
        },
        annotation:{},
      },
      scales:{
        x:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{color:'#66696c',font:{family:'Maven Pro',size:11},maxTicksLimit:6,maxRotation:30},
          border:{color:'rgba(255,255,255,0.08)'},
          title:{display:true,text:'Datum/tijd (Venlo, incl. vertraging t.o.v. Sint Pieter)',color:'#66696c',font:{family:'Maven Pro',size:11},padding:{top:6}},
        },
        y:{
          grid:{color:'rgba(255,255,255,0.05)'},
          ticks:{color:'#66696c',font:{family:'Maven Pro',size:11},callback:v=>v.toFixed(0)},
          border:{display:false},
          title:{display:true,text:'Waterhoogte Venlo (cm t.o.v. NAP)',color:'#66696c',font:{family:'Maven Pro',size:11},padding:{bottom:6}},
        },
      },
    },
  });
}
